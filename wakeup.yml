name: Streamlit Wakeup

on:
  schedule:
    # Runs at 1:30 AM UTC = 7:00 AM IST
    - cron: '30 1 * * *'
  workflow_dispatch:  # lets you manually trigger it from the Actions tab to test

jobs:
  wake-app:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Visit and wake the app
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright

          APP_URL = "https://gis-toolkit.streamlit.app"

          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto(APP_URL, wait_until="networkidle", timeout=60000)

              # If the app is sleeping, Streamlit shows a wake-up button
              try:
                  wake_button = page.get_by_text("Yes, get this app back up!", exact=False)
                  if wake_button.is_visible(timeout=5000):
                      wake_button.click()
                      print("App was asleep — clicked wake-up button.")
                      page.wait_for_timeout(15000)  # give it time to spin up
                  else:
                      print("App was already awake.")
              except Exception:
                  print("App was already awake (no wake-up button found).")

              browser.close()
          EOF
